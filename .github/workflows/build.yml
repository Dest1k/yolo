name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.4/bin
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Cache NCNN
        id: cache-ncnn
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/ncnn
          key: ncnn-20240102-android-vulkan

      - name: Download NCNN
        if: steps.cache-ncnn.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20240102/ncnn-20240102-android-vulkan.zip -O ncnn.zip
          unzip -q ncnn.zip
          mkdir -p app/src/main/cpp/ncnn
          cp -r ncnn-20240102-android-vulkan/arm64-v8a   app/src/main/cpp/ncnn/
          cp -r ncnn-20240102-android-vulkan/armeabi-v7a app/src/main/cpp/ncnn/
          rm -rf ncnn.zip ncnn-20240102-android-vulkan

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-android-

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.4/bin
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-desktop-linux-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-desktop-linux-

      - name: Build Desktop .deb
        run: ./gradlew :desktop:packageDeb --stacktrace

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-linux-deb
          path: desktop/build/compose/binaries/main/deb/*.deb
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          Invoke-WebRequest -Uri "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -OutFile "$env:TEMP\gradle.zip"
          Expand-Archive -Path "$env:TEMP\gradle.zip" -DestinationPath "C:\gradle"
          $env:PATH += ";C:\gradle\gradle-8.4\bin"
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-desktop-windows-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-desktop-windows-

      # jpackage --type msi needs the WiX 3 toolset (candle.exe/light.exe), which
      # is no longer preinstalled on the windows-latest runner image.
      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Build Desktop .msi
        run: .\gradlew.bat :desktop:packageMsi --stacktrace

      - name: Upload Windows .msi
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-windows-msi
          path: desktop/build/compose/binaries/main/msi/*.msi
          retention-days: 30
