name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.4/bin
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/26.1.10909125
          key: android-ndk-26.1.10909125

      - name: Install NDK and CMake
        run: |
          # Provision NDK r26b robustly: AGP otherwise auto-downloads it during
          # configuration, and a corrupted download fails the whole build
          # ("Archive is not a ZIP archive"). Retry + verify so a flaky Google
          # mirror doesn't break CI; the cache above skips the download on reuse.
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/26.1.10909125"
          for i in 1 2 3 4; do
            if [ -f "$NDK_DIR/source.properties" ]; then
              echo "NDK present (attempt $i)"; break
            fi
            echo "Installing NDK + CMake (attempt $i)…"
            rm -rf "$NDK_DIR"
            yes | sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1" || true
            [ -f "$NDK_DIR/source.properties" ] && { echo "NDK installed"; break; }
            sleep $((i * 10))
          done
          test -f "$NDK_DIR/source.properties" || { echo "::error::NDK install failed after retries"; exit 1; }
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

      - name: Cache NCNN
        id: cache-ncnn
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/ncnn
          key: ncnn-20241226-android

      - name: Download NCNN
        if: steps.cache-ncnn.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20241226/ncnn-20241226-android.zip -O ncnn.zip
          unzip -q ncnn.zip
          mkdir -p app/src/main/cpp/ncnn
          cp -r ncnn-20241226-android/arm64-v8a   app/src/main/cpp/ncnn/
          cp -r ncnn-20241226-android/armeabi-v7a app/src/main/cpp/ncnn/
          rm -rf ncnn.zip ncnn-20241226-android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-android-

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.4/bin
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-desktop-linux-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-desktop-linux-

      - name: Build Desktop .deb
        run: ./gradlew :desktop:packageDeb --stacktrace

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-linux-deb
          path: desktop/build/compose/binaries/main/deb/*.deb
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          Invoke-WebRequest -Uri "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -OutFile "$env:TEMP\gradle.zip"
          Expand-Archive -Path "$env:TEMP\gradle.zip" -DestinationPath "C:\gradle"
          $env:PATH += ";C:\gradle\gradle-8.4\bin"
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-desktop-windows-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-desktop-windows-

      # Build the portable app-image (jpackage --type app-image) instead of the
      # MSI installer. The Compose plugin downloads its own WiX 3.11, so WiX was
      # never missing — the MSI step fails inside jpackage with an error GitHub
      # never surfaces (written to jpackage-*-err.txt). The app-image needs no
      # installer tooling (createRuntimeImage already succeeds) and is a directly
      # runnable Windows build.
      - name: Build Desktop app-image
        run: .\gradlew.bat :desktop:createDistributable --stacktrace

      - name: Upload Windows app-image
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-windows
          path: desktop/build/compose/binaries/main/app/**
          retention-days: 30
