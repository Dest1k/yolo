name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Cache NCNN
        id: cache-ncnn
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/ncnn
          key: ncnn-20240102-android-vulkan

      - name: Download NCNN
        if: steps.cache-ncnn.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20240102/ncnn-20240102-android-vulkan.zip -O ncnn.zip
          unzip -q ncnn.zip
          mkdir -p app/src/main/cpp/ncnn
          cp -r ncnn-20240102-android-vulkan/arm64-v8a   app/src/main/cpp/ncnn/
          cp -r ncnn-20240102-android-vulkan/armeabi-v7a app/src/main/cpp/ncnn/
          rm -rf ncnn.zip ncnn-20240102-android-vulkan

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
