name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          wget -q https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar \
            -O gradle/wrapper/gradle-wrapper.jar || \
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar \
            -O gradle/wrapper/gradle-wrapper.jar || \
          curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o gradle-dist.zip && \
            unzip -q gradle-dist.zip gradle-8.4/lib/gradle-wrapper-*.jar -d /tmp/gw && \
            cp /tmp/gw/gradle-8.4/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar || true
          # Fallback: use gradle to generate wrapper
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi

      - name: Cache NCNN
        id: cache-ncnn
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/ncnn
          key: ncnn-20240102-android-vulkan

      - name: Download NCNN
        if: steps.cache-ncnn.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20240102/ncnn-20240102-android-vulkan.zip -O ncnn.zip
          unzip -q ncnn.zip
          mkdir -p app/src/main/cpp/ncnn
          cp -r ncnn-20240102-android-vulkan/arm64-v8a   app/src/main/cpp/ncnn/
          cp -r ncnn-20240102-android-vulkan/armeabi-v7a app/src/main/cpp/ncnn/
          rm -rf ncnn.zip ncnn-20240102-android-vulkan

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yolo-detector-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
